version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1

phases:
  pre_build:
    commands:
      - echo "Installing dependencies..."
      - npm ci --include=dev
      - echo "Compiling TypeScript..."
      - ./node_modules/.bin/tsc
      - echo "Running unit tests..."
      - npm run test -- --coverage --passWithNoTests

  build:
    commands:
      - echo "Synthesizing CDK stacks..."
      - ./node_modules/.bin/cdk synth
      - echo "Generated templates:"
      - ls -la cdk.out/*.template.json

  post_build:
    commands:
      - echo "Build and synthesis complete"

artifacts:
  name: RobofleetArtifacts
  files:
    - "cdk.out/**/*"
    - "package.json"
    - "tsconfig.json"
    - "buildspec.yml"
  discard-paths: no

logs:
  cloudwatch-logs:
    group-name: /aws/codebuild/robofleet-build
    stream-name: build-output

cache:
  paths:
    - '/root/.npm/**/*'
    - 'node_modules/**/*'
